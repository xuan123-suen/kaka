<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购物清单 | 卡卡跨境仓</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
header{background:#111;color:#fff;padding:0 2rem;height:56px;display:flex;align-items:center}
.header-inner{max-width:700px;margin:0 auto;width:100%;display:flex;align-items:center;gap:1rem}
.back-btn{color:#aaa;text-decoration:none;font-size:0.85rem;display:flex;align-items:center;gap:0.3rem}
.back-btn:hover{color:#fff}
.page-title{font-size:1rem;font-weight:600}
.wrap{max-width:700px;margin:2rem auto;padding:0 1.5rem}
.card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;overflow:hidden;margin-bottom:1rem}
.card-title{padding:1rem 1.25rem;border-bottom:1px solid #f0f0f0;font-size:0.88rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.06em}
table{width:100%;border-collapse:collapse}
thead th{padding:0.7rem 1.25rem;text-align:left;font-size:0.72rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.07em;background:#fafafa;border-bottom:1px solid #e5e5e5}
tbody tr{border-bottom:1px solid #f5f5f5}
tbody tr:last-child{border-bottom:none}
td{padding:0.85rem 1.25rem;font-size:0.88rem;vertical-align:middle}
.td-name{font-weight:500}
.td-price{color:#dc2626;font-weight:600}
.td-sub{color:#888;font-size:0.78rem}
.total-row{padding:1.25rem;display:flex;justify-content:space-between;align-items:center;border-top:2px solid #111}
.total-label{font-size:0.88rem;color:#555}
.total-price{font-size:1.8rem;font-weight:700;color:#dc2626}
.notice-card{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.notice-title{font-size:0.88rem;font-weight:600;color:#92400e;margin-bottom:0.5rem}
.notice-body{font-size:0.82rem;color:#92400e;line-height:1.8}
.wechat-box{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:1.25rem;text-align:center}
.wechat-label{font-size:0.82rem;color:#166534;margin-bottom:0.4rem}
.wechat-id{font-size:1.4rem;font-weight:700;color:#166534;letter-spacing:0.04em}
.hint{font-size:0.78rem;color:#888;margin-top:0.6rem}
.screenshot-hint{background:#111;color:#fff;border-radius:12px;padding:1.1rem 1.25rem;text-align:center;font-size:0.85rem;line-height:1.7;margin-bottom:1rem}
.screenshot-hint strong{color:#60a5fa}
.empty-cart{text-align:center;padding:4rem 2rem;color:#aaa}
.empty-cart div{font-size:3rem;margin-bottom:1rem}
.btn-back{display:inline-block;margin-top:1rem;padding:0.6rem 1.4rem;background:#2563eb;color:#fff;border-radius:8px;text-decoration:none;font-size:0.85rem;font-weight:500}
@media(max-width:600px){.wrap{padding:0 1rem}.total-price{font-size:1.4rem}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="back-btn" href="index.html">← 返回报价表</a>
    <div class="page-title">🛒 购物清单</div>
  </div>
</header>
<div class="wrap" id="wrap">
  <div class="empty-cart" id="empty-cart" style="display:none">
    <div>🛒</div>
    <p>购物车是空的</p>
    <a class="btn-back" href="index.html">去选购商品</a>
  </div>
  <div id="cart-content"></div>
</div>
<script>
const raw=sessionStorage.getItem('kaka_cart');
const items=raw?JSON.parse(raw):[];

if(!items.length){
  document.getElementById('empty-cart').style.display='block';
}else{
  function pn(p){const m=(p||'').replace(/[¥,]/g,'').match(/[\d.]+/);return m?parseFloat(m[0]):0;}
  let total=0;
  const rows=items.map((item,i)=>{
    const sub=pn(item.price)*item.qty;
    total+=sub;
    return`<tr>
      <td class="td-name">${item.name}</td>
      <td>${item.price}<span class="td-sub"> × ${item.qty}</span></td>
      <td class="td-price">¥${sub.toLocaleString('zh-CN',{minimumFractionDigits:0})}</td>
    </tr>`;
  }).join('');

  document.getElementById('cart-content').innerHTML=`
    <div class="screenshot-hint">📸 请将此页面<strong>截图</strong>后发送给客服，客服将为您确认订单</div>
    <div class="card">
      <div class="card-title">已选商品</div>
      <table>
        <thead><tr><th>商品名称</th><th>单价 × 数量</th><th>小计</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="total-row">
        <div class="total-label">合计（${items.length}种商品）</div>
        <div class="total-price">¥${total.toLocaleString('zh-CN',{minimumFractionDigits:0})}</div>
      </div>
    </div>
    <div class="notice-card">
      <div class="notice-title">⚠️ 下单说明</div>
      <div class="notice-body">
        · 以上价格为一件代发价格，最终以实际下单时报价为准<br>
        · 价格每天变动，请以当天报价为准<br>
        · 截图此页面发给客服确认后下单<br>
        · 非本仓原因，出单不退不换
      </div>
    </div>
    <div class="wechat-box">
      <div class="wechat-label">📱 截图后添加微信发送清单</div>
      <div class="wechat-id">kaka648648</div>
      <div class="hint">工作时间：周一至周六 9:00–21:00</div>
    </div>
  `;
}
</script>
</body>
</html>
