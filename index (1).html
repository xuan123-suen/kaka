const cats = [...new Set(products.map(p=>p.cat))];
const tagClass = {'减肥':'tag-减肥','糖尿病':'tag-糖尿病','美白':'tag-美白','痛风':'tag-痛风','心脏':'tag-心脏','胃肠':'tag-胃肠','妇科':'tag-妇科','骨骼关节':'tag-骨骼关节','护肝':'tag-护肝','眼药':'tag-眼药','鼻炎过敏':'tag-鼻炎过敏','感冒止咳':'tag-感冒止咳','皮肤外用':'tag-皮肤外用','贴剂':'tag-贴剂','止痛':'tag-止痛','神经脑部':'tag-神经脑部','血压血脂':'tag-血压血脂','保健品':'tag-保健品','其他':'tag-其他'};

let currentCat='全部', currentSort='default', currentSearch='';
document.getElementById('stat-total').textContent=products.length;

// Build filter buttons
const bar=document.getElementById('filter-bar');
cats.forEach(c=>{
  const btn=document.createElement('button');
  btn.className='filter-btn';
  btn.dataset.cat=c;
  btn.textContent=c;
  bar.appendChild(btn);
});

function priceNum(p){
  const m=p.replace(/[¥,]/g,'').match(/[\d.]+/);
  return m?parseFloat(m[0]):0;
}

function getFiltered(){
  let list=[...products];
  if(currentCat!=='全部') list=list.filter(p=>p.cat===currentCat);
  if(currentSearch){const q=currentSearch.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(q));}
  if(currentSort==='price-asc') list.sort((a,b)=>priceNum(a.price)-priceNum(b.price));
  else if(currentSort==='price-desc') list.sort((a,b)=>priceNum(b.price)-priceNum(a.price));
  else if(currentSort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  return list;
}

function render(){
  const list=getFiltered();
  const tbody=document.getElementById('tbody');
  const empty=document.getElementById('empty');
  document.getElementById('result-count').textContent='共 '+list.length+' 项';
  if(!list.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=list.map((p,i)=>`
    <tr>
      <td>${i+1}</td>
      <td class="td-name">${p.name}${p.note?'<span class="td-note">'+p.note+'</span>':''}</td>
      <td><span class="tag ${tagClass[p.cat]||'tag-其他'}">${p.cat}</span></td>
      <td><span class="price">${p.price}</span></td>
    </tr>
  `).join('');
}

document.getElementById('search').addEventListener('input',function(){currentSearch=this.value.trim();render();});
document.getElementById('filter-bar').addEventListener('click',function(e){
  const btn=e.target.closest('.filter-btn');
  if(!btn)return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCat=btn.dataset.cat;
  render();
});
document.getElementById('sort-select').addEventListener('change',function(){currentSort=this.value;render();});
render();
</script>
