function goCart(){const items=Object.entries(cart).filter(([_,v])=>v>0);if(!items.length){alert('还没有选择任何商品哦～');return;}const data=items.map(([idx,qty])=>({name:products[idx].name,price:products[idx].price,qty}));sessionStorage.setItem('kaka_cart',JSON.stringify(data));window.location.href='cart.html';}
document.getElementById('search').addEventListener('input',function(){cq=this.value.trim();render();});
document.getElementById('sort-select').addEventListener('change',function(){cs=this.value;render();});
render();
</script></body></html>
