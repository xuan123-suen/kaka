<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡卡跨境仓 | 产品报价表</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e5e5e5;padding:0 2rem;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{font-size:1.1rem;font-weight:600}.logo span{color:#2563eb}
.header-meta{font-size:0.78rem;color:#888}
.hero-band{background:#111;color:#fff;padding:2.5rem 2rem}
.hero-inner{max-width:1200px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.hero-title{font-size:1.8rem;font-weight:600;letter-spacing:-0.03em;line-height:1.2}
.hero-title span{color:#60a5fa}
.hero-sub{font-size:0.85rem;color:#aaa;margin-top:0.4rem}
.hero-stats{display:flex;gap:2rem}
.hstat-num{font-size:1.6rem;font-weight:600;line-height:1}
.hstat-label{font-size:0.72rem;color:#aaa;margin-top:0.2rem;text-transform:uppercase;letter-spacing:0.06em}
.notice{background:#fffbeb;border:1px solid #fde68a;max-width:1200px;margin:1.5rem auto 0;padding:0.9rem 1.5rem;border-radius:10px;font-size:0.82rem;color:#92400e;line-height:1.7}
.notice strong{font-weight:600}
.controls{background:#fff;border-bottom:1px solid #e5e5e5;padding:1rem 2rem;position:sticky;top:60px;z-index:99}
.controls-inner{max-width:1200px;margin:0 auto;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;padding:0.55rem 1rem 0.55rem 2.4rem;border:1px solid #e5e5e5;border-radius:8px;font-size:0.88rem;font-family:inherit;outline:none;background:#f9f9f9}
.search-wrap input:focus{border-color:#2563eb;background:#fff}
.search-icon{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:#aaa}
.sort-select{padding:0.45rem 0.75rem;border:1px solid #e5e5e5;border-radius:6px;font-size:0.78rem;font-family:inherit;color:#555;outline:none;cursor:pointer;background:#fff}
.result-count{margin-left:auto;font-size:0.78rem;color:#888;white-space:nowrap}
.table-wrap{max-width:1200px;margin:1.5rem auto;padding:0 2rem}
.table-card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid #e5e5e5}
thead th{padding:0.85rem 1rem;text-align:left;font-size:0.72rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.07em;background:#fafafa;white-space:nowrap}
tbody tr{border-bottom:1px solid #f0f0f0;transition:background 0.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f9fafb}
td{padding:0.75rem 1rem;font-size:0.875rem;vertical-align:middle}
td:first-child{text-align:center;color:#ccc;font-size:0.75rem;width:44px}
.td-name{font-weight:500;color:#2563eb;cursor:pointer;text-decoration:none}
.td-name:hover{text-decoration:underline}
.td-note{display:block;font-weight:400;color:#888;font-size:0.73rem;margin-top:0.1rem}
.price{font-weight:600;font-size:0.95rem;color:#dc2626}
/* QTY */
.qty-wrap{display:flex;align-items:center;gap:0.4rem}
.qty-btn{width:26px;height:26px;border:1px solid #e5e5e5;border-radius:6px;background:#fff;cursor:pointer;font-size:1rem;line-height:1;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.qty-btn:hover{background:#2563eb;color:#fff;border-color:#2563eb}
.qty-num{width:32px;text-align:center;font-size:0.88rem;font-weight:500}
/* CART FAB */
.cart-fab{position:fixed;bottom:2rem;right:2rem;width:58px;height:58px;border-radius:50%;background:#2563eb;color:#fff;border:none;cursor:pointer;font-size:1.5rem;box-shadow:0 4px 20px rgba(37,99,235,0.4);display:flex;align-items:center;justify-content:center;z-index:200;transition:transform 0.15s}
.cart-fab:hover{transform:scale(1.08)}
.cart-badge{position:absolute;top:-4px;right:-4px;background:#dc2626;color:#fff;border-radius:50%;width:20px;height:20px;font-size:0.68rem;font-weight:700;display:flex;align-items:center;justify-content:center;display:none}
.cart-badge.show{display:flex}
.empty{text-align:center;padding:4rem 2rem;color:#aaa}
.page-footer{max-width:1200px;margin:0 auto;padding:1.5rem 2rem 5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.footer-note{font-size:0.75rem;color:#aaa;line-height:1.8}
.footer-contact{font-size:0.88rem;color:#111;font-weight:500}
.footer-contact span{color:#2563eb}
@media(max-width:768px){.hero-stats{display:none}.table-wrap{padding:0 0.75rem}.controls{padding:0.75rem 1rem;top:60px}.hero-band{padding:1.5rem 1rem}.notice{margin:1rem 1rem 0;padding:0.75rem 1rem}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">卡卡跨境仓 <span>·</span> 产品报价</div>
    <div class="header-meta">更新日期：__DATE__ · 价格随时变动</div>
  </div>
</header>
<div class="hero-band">
  <div class="hero-inner">
    <div>
      <div class="hero-title">产品报价表<br><span>2026年度</span></div>
      <div class="hero-sub">报价为一件代发价格 · 价格每天变动，按当下报价为准</div>
    </div>
    <div class="hero-stats">
      <div class="hstat"><div class="hstat-num" id="stat-total">0</div><div class="hstat-label">在售产品</div></div>
      <div class="hstat"><div class="hstat-num">周一至周六</div><div class="hstat-label">工作时间 9:00–21:00</div></div>
    </div>
  </div>
</div>
<div class="table-wrap" style="margin-top:1.5rem;margin-bottom:0">
  <div class="notice">⚠️ <strong>免责声明：</strong>不做导购！请遵医嘱！&nbsp;&nbsp;🔴 <strong>只做正品！！</strong>&nbsp;&nbsp;大部分产品同款10个以上可优惠 · 非本仓原因，出单不退不换 · 其他时间留言，上班后回复</div>
</div>
<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="search" placeholder="搜索产品名称…"></div>
    <select class="sort-select" id="sort-select">
      <option value="default">默认排序</option>
      <option value="price-asc">价格从低到高</option>
      <option value="price-desc">价格从高到低</option>
      <option value="name">按名称</option>
    </select>
    <div class="result-count" id="result-count"></div>
  </div>
</div>
<div class="table-wrap">
  <div class="table-card">
    <table>
      <thead><tr><th>#</th><th>产品名称</th><th>价格</th><th>数量</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none"><div style="font-size:2.5rem;margin-bottom:0.75rem">📭</div><p>没有找到匹配的产品</p></div>
  </div>
</div>
<div class="page-footer">
  <div class="footer-note">· 价格每天变动，按当下报价为准，下单前再询价<br>· 工作时间：周一至周六 9:00–21:00，其他时间留言上班后回复</div>
  <div class="footer-contact">微信号：<span>kaka648648</span></div>
</div>

<!-- CART FAB -->
<button class="cart-fab" onclick="goCart()">
  🛒<span class="cart-badge" id="cart-badge">0</span>
</button>

<script>
const products = __PRODUCTS__;

let cart={};
let cq='',cs='default';

document.getElementById('stat-total').textContent=products.length;

function pn(p){const m=(p||'').replace(/[¥,]/g,'').match(/[\d.]+/);return m?parseFloat(m[0]):0;}

function getFiltered(){
  let l=[...products];
  if(cq){const q=cq.toLowerCase();l=l.filter(p=>p.name.toLowerCase().includes(q));}
  if(cs==='price-asc')l.sort((a,b)=>pn(a.price)-pn(b.price));
  else if(cs==='price-desc')l.sort((a,b)=>pn(b.price)-pn(a.price));
  else if(cs==='name')l.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  return l;
}

function updateCartBadge(){
  const total=Object.values(cart).reduce((s,v)=>s+v,0);
  const badge=document.getElementById('cart-badge');
  badge.textContent=total;
  total>0?badge.classList.add('show'):badge.classList.remove('show');
}

function setQty(idx,val){
  const n=Math.max(0,parseInt(val)||0);
  if(n===0)delete cart[idx];else cart[idx]=n;
  updateCartBadge();
  // update input
  const inp=document.getElementById('qty-'+idx);
  if(inp)inp.value=n||0;
}

function render(){
  const list=getFiltered();
  const tbody=document.getElementById('tbody');
  const empty=document.getElementById('empty');
  document.getElementById('result-count').textContent='共 '+list.length+' 项';
  if(!list.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=list.map((p,i)=>{
    const idx=products.indexOf(p);
    const qty=cart[idx]||0;
    const slug='product-'+idx+'.html';
    return`<tr>
      <td>${i+1}</td>
      <td><a class="td-name" href="${slug}">${p.name}</a>${p.note?'<span class="td-note">'+p.note+'</span>':''}</td>
      <td><span class="price">${p.price}</span></td>
      <td>
        <div class="qty-wrap">
          <button class="qty-btn" onclick="setQty(${idx},(cart[${idx}]||0)-1)">−</button>
          <span class="qty-num" id="qty-${idx}">${qty}</span>
          <button class="qty-btn" onclick="setQty(${idx},(cart[${idx}]||0)+1)">＋</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function goCart(){
  const items=Object.entries(cart).filter(([_,v])=>v>0);
  if(!items.length){alert('还没有选择任何商品哦～');return;}
  const data=items.map(([idx,qty])=>({name:products[idx].name,price:products[idx].price,qty}));
  sessionStorage.setItem('kaka_cart',JSON.stringify(data));
  window.location.href='cart.html';
}

document.getElementById('search').addEventListener('input',function(){cq=this.value.trim();render();});
document.getElementById('sort-select').addEventListener('change',function(){cs=this.value;render();});
render();
</script>
</body>
</html>
