<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>多替诺雷 2 | 卡卡跨境仓</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#111;min-height:100vh}header{background:#111;color:#fff;padding:0 2rem;height:56px;display:flex;align-items:center}.hi{max-width:800px;margin:0 auto;width:100%;display:flex;align-items:center;gap:1rem}.back{color:#aaa;text-decoration:none;font-size:0.85rem}.back:hover{color:#fff}.wrap{max-width:800px;margin:2rem auto;padding:0 1.5rem 4rem}.card{background:#fff;border-radius:16px;border:1px solid #e5e5e5;overflow:hidden}.img-wrap{width:100%;aspect-ratio:4/3;max-height:360px;overflow:hidden;background:#f3f4f6}.body{padding:1.75rem}.name{font-size:1.4rem;font-weight:600;line-height:1.3;margin-bottom:0.5rem}.note{font-size:0.85rem;color:#888;margin-bottom:1rem}.price{font-size:2rem;font-weight:700;color:#dc2626;margin-bottom:1.5rem}.price span{font-size:0.9rem;font-weight:400;color:#aaa;margin-left:0.3rem}.qty-section{border-top:1px solid #f0f0f0;padding-top:1.25rem}.qty-label{font-size:0.82rem;color:#888;margin-bottom:0.75rem}.qty-row{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}.qty-wrap{display:flex;align-items:center;gap:0.5rem}.qty-btn{width:36px;height:36px;border:1px solid #e5e5e5;border-radius:8px;background:#fff;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s}.qty-btn:hover{background:#2563eb;color:#fff;border-color:#2563eb}.qty-num{width:44px;text-align:center;font-size:1rem;font-weight:600}.add-btn{flex:1;padding:0.7rem 1.5rem;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background 0.15s;min-width:160px}.add-btn:hover{background:#1d4ed8}.add-btn.added{background:#16a34a}.notice-row{margin-top:0.75rem;font-size:0.75rem;color:#aaa}.wbar{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:1rem 1.25rem;margin-top:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem}.wbar-text{font-size:0.82rem;color:#166534}.wbar-id{font-size:1rem;font-weight:700;color:#166534}@media(max-width:600px){.wrap{padding:0 0 4rem}.card{border-radius:0;border-left:none;border-right:none}.body{padding:1.25rem}}</style>
</head><body>
<header><div class="hi"><a class="back" href="index.html">← 返回报价表</a></div></header>
<div class="wrap"><div class="card">
<div class="img-wrap"><div style="width:100%;aspect-ratio:4/3;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:5rem;color:#d1d5db">🏷️</div></div>
<div class="body">
<div class="name">多替诺雷 2</div>

<div class="price">¥436 <span>一件代发价</span></div>
<div style="font-size:0.88rem;color:#aaa;border-top:1px solid #f0f0f0;padding-top:1.25rem;margin-bottom:1.5rem">暂无产品介绍，请联系客服了解详情</div>
<div class="qty-section">
<div class="qty-label">选择数量，加入购物清单</div>
<div class="qty-row">
<div class="qty-wrap"><button class="qty-btn" onclick="c(-1)">−</button><span class="qty-num" id="qd">1</span><button class="qty-btn" onclick="c(1)">＋</button></div>
<button class="add-btn" id="ab" onclick="add()">🛒 加入购物清单</button>
</div>
<div class="notice-row">⚠️ 请遵医嘱 · 价格随时变动，以当日报价为准</div>
</div>
<div class="wbar"><div class="wbar-text">📱 下单请添加微信</div><div class="wbar-id">kaka648648</div></div>
</div></div></div>
<script>
let qty=1;
function c(d){qty=Math.max(1,qty+d);document.getElementById('qd').textContent=qty;}
function add(){
  const raw=sessionStorage.getItem('kaka_cart');let items=[];try{if(raw)items=JSON.parse(raw);}catch(e){}
  const name='多替诺雷 2',price='¥436';
  const ex=items.find(i=>i.name===name);if(ex)ex.qty+=qty;else items.push({name,price,qty});
  sessionStorage.setItem('kaka_cart',JSON.stringify(items));
  const b=document.getElementById('ab');b.textContent='✅ 已加入！';b.classList.add('added');
  setTimeout(()=>{b.textContent='🛒 加入购物清单';b.classList.remove('added');},1500);
}
</script></body></html>
